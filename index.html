<style>

.fbar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap;align-items:center}.fbar label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.06em}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.main>*{animation:fadeUp .4s ease both}

<body>
<div class="hdr"><div class="w">
  <h1>AI Agent Performance Tracker</h1>
  <p class="hdr-sub">Polymarket on-chain trade data. Bot vs human classification across all market categories.</p>
  <div class="pills" id="badges"><span class="pill pill-b">Press Fetch to load</span></div>
</div></div>
<div class="nav"><div class="w nav-in" id="nav"></div></div>
<div class="w main" id="ct"></div>
<script>
let polyT=[],W=[],filter="all",tab="Dashboard",loading=false,logL=[],pct=0,timeRange={min:0,max:0};
const TABS=["Dashboard","P&L Comparison","Bot Strategies","Win Rates","Market Impact","By Contract Type"];
const BM=[{n:"0x8dxd",c:"bot",s:"Arbitrage",p:550000,w:98,t:6615,cat:"crypto15m",src:"CoinDesk Jan 2026"},{n:"ilovecircle",c:"bot",s:"Model-driven",p:2200000,w:74,t:null,cat:"mixed",src:"PolyTrack Dec 2025"},{n:"Theo/Fredi9999",c:"human",s:"Information",p:85000000,w:null,t:20,cat:"political",src:"WSJ, Bloomberg Nov 2024"},{n:"zxgngl",c:"human",s:"Information",p:18000000,w:null,t:null,cat:"political",src:"Cointelegraph Nov 2024"},{n:"GCottrell93",c:"human",s:"Information",p:8800000,w:null,t:null,cat:"political",src:"Polymarket Leaderboard"}];
function tg(t,c){return`<span class="tg tg-${c}">${t}</span>`}
function catTg(cat){return{crypto15m:"r",crypto:"a",sports:"b",political:"p",geopolitics:"geo",tech:"tech",finance:"fin",culture:"cult",tweets:"tw",weather:"wx",other:"gr"}[cat]||"gr"}
function catLabel(cat){return{crypto15m:"Crypto 15m",crypto:"Crypto",sports:"Sports",political:"US Politics",geopolitics:"Geopolitics",tech:"Tech/AI",finance:"Finance",culture:"Culture",tweets:"Tweets",weather:"Weather",other:"Other"}[cat]||cat}
function fmt(n){return n>=1e6?"$"+(n/1e6).toFixed(1)+"M":n>=1e3?"$"+(n/1e3).toFixed(0)+"k":"$"+n}
function log(m,c=""){logL.push({m,c});if(logL.length>100)logL.shift()}
function fmtTime(ts){if(!ts)return"-";const d=new Date(ts*1000);return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})+" "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}

function catS(s,t){const x=((s||"")+(t||"")).toLowerCase();
  if(x.includes("15m")||x.includes("up-or-down")||x.includes("updown"))return"crypto15m";
  if(x.includes("btc")||x.includes("bitcoin")||x.includes("eth")||x.includes("ethereum")||x.includes("solana")||x.includes("xrp")||x.includes("dogecoin")||x.includes("crypto")||x.includes("token"))return"crypto";
  if(x.includes("nba")||x.includes("nfl")||x.includes("nhl")||x.includes("ucl")||x.includes("atp")||x.includes("wta")||x.includes("mlb")||x.includes("ncaa")||x.includes("lakers")||x.includes("celtics")||x.includes("dota")||x.includes("csgo")||x.includes("valorant")||x.includes("premier")||x.includes("champions")||x.includes("serie a")||x.includes("bundesliga")||x.includes("o/u")||x.includes("btts")||x.includes("spl")||x.includes("pga")||x.includes("mma")||x.includes("ufc")||x.includes("f1"))return"sports";
  if(x.includes("iran")||x.includes("ukraine")||x.includes("russia")||x.includes("china")||x.includes("israel")||x.includes("ceasefire")||x.includes("strike")||x.includes("war")||x.includes("nato")||x.includes("khamenei")||x.includes("venezuela")||x.includes("maduro")||x.includes("lebanon"))return"geopolitics";
  if(x.includes("trump")||x.includes("election")||x.includes("congress")||x.includes("president")||x.includes("fed ")||x.includes("federal reserve")||x.includes("tariff")||x.includes("governor")||x.includes("biden")||x.includes("senate")||x.includes("democrat")||x.includes("republican")||x.includes("midterm")||x.includes("primary")||x.includes("shutdown")||x.includes("scotus")||x.includes("supreme court"))return"political";
  if(x.includes("openai")||x.includes("spacex")||x.includes("ipo")||x.includes("apple")||x.includes("nvidia")||x.includes("google")||x.includes("anthropic")||x.includes("tiktok")||x.includes("app store")||x.includes("ai ")||x.includes("gpt")||x.includes("science")||x.includes("starship"))return"tech";
  if(x.includes("earning")||x.includes("revenue")||x.includes("s&p")||x.includes("nasdaq")||x.includes("stock")||x.includes("oil")||x.includes("commodity")||x.includes("gold")||x.includes("interest rate")||x.includes("gdp")||x.includes("inflation")||x.includes("cpi")||x.includes("jobs report"))return"finance";
  if(x.includes("oscar")||x.includes("academy award")||x.includes("emmy")||x.includes("grammy")||x.includes("movie")||x.includes("film")||x.includes("netflix")||x.includes("podcast")||x.includes("late night")||x.includes("mention")||x.includes("subscriber")||x.includes("youtube")||x.includes("spotify")||x.includes("celebrity"))return"culture";
  if(x.includes("musk")||x.includes("tweet")||x.includes("elon")||x.includes("posts from"))return"tweets";
  if(x.includes("temperature")||x.includes("weather")||x.includes("high of")||x.includes("low of")||x.includes("degrees"))return"weather";
  return"other"}

function buildW(){
  const byW={};
  polyT.forEach(t=>{const w=t.wallet;if(!w)return;if(!byW[w])byW[w]={w,n:t.name,trades:[],cats:new Set(),tss:[],sides:{BUY:0,SELL:0}};byW[w].trades.push(t);byW[w].cats.add(t.cat);byW[w].tss.push(t.ts);byW[w].sides[t.side]=(byW[w].sides[t.side]||0)+1;if(t.name&&!byW[w].n)byW[w].n=t.name});
  W=Object.values(byW).map(wl=>{
    const tc=wl.trades.length;const sizes=wl.trades.map(t=>t.size);
    const avg=sizes.length?sizes.reduce((a,b)=>a+b,0)/sizes.length:0;
    const std=sizes.length>1?Math.sqrt(sizes.reduce((a,v)=>a+(v-avg)**2,0)/sizes.length):0;
    const cv=avg>0?std/avg:0;const tsA=wl.tss.sort();
    const sTs=tsA.length>1&&new Set(tsA).size<tsA.length;
    let sS=false;for(let i=1;i<tsA.length;i++){if(Math.abs(tsA[i]-tsA[i-1])<=1){sS=true;break}}
    const hrs=new Set(tsA.map(t=>new Date(t*1000).getUTCHours())).size;
    const ts=(wl.sides.BUY||0)+(wl.sides.SELL||0);const sb=ts>0?Math.min(wl.sides.BUY||0,wl.sides.SELL||0)/ts:0;
    let sc=0;if(tc>=10)sc+=.15;else if(tc>=3)sc+=.1;
    if(sTs||sS)sc+=.25;if(cv<.15&&tc>2)sc+=.2;else if(cv<.3&&tc>1)sc+=.1;
    if(sb>.3)sc+=.1;if(wl.cats.size>=3)sc+=.1;if(hrs>=6)sc+=.05;
    // P&L computation: separate resolved (real) from unrealised (estimated)
    const rm=window._rm||{};
    const byMkt={};wl.trades.forEach(t=>{
      const key=t.slug||t.title;if(!byMkt[key])byMkt[key]={buys:[],sells:[],lastPrice:t.price,slug:t.slug,resolved:false,yesWon:false};
      byMkt[key][t.side==="BUY"?"buys":"sells"].push(t);byMkt[key].lastPrice=t.price;
    });
    // Check which markets are resolved
    Object.values(byMkt).forEach(m=>{
      Object.entries(rm).forEach(([mktId,info])=>{if(info.slug&&m.slug&&info.slug===m.slug){m.resolved=true;m.yesWon=info.yesWon}});
    });
    let resolvedPnl=0,unrealPnl=0,resolvedCount=0,unrealCount=0;
    Object.values(byMkt).forEach(m=>{
      const bQty=m.buys.reduce((a,t)=>a+t.size,0),bCost=m.buys.reduce((a,t)=>a+t.size*t.price,0);
      const sQty=m.sells.reduce((a,t)=>a+t.size,0),sRev=m.sells.reduce((a,t)=>a+t.size*t.price,0);
      if(m.resolved){
        // Real P&L from resolution
        resolvedCount++;
        // Buys: if bought YES and YES won, payout = size * 1.00, cost = size * price
        // If bought YES and NO won, payout = 0
        const buyPnl=m.buys.reduce((a,t)=>{
          const isYes=t.outcome==="Yes"||t.outcome==="";
          if(isYes){return a+(m.yesWon?t.size*(1-t.price):t.size*(-t.price))}
          else{return a+(m.yesWon?t.size*(-t.price):t.size*(1-t.price))}
        },0);
        // Sells are closing positions: revenue already captured
        const sellPnl=m.sells.reduce((a,t)=>{
          const isYes=t.outcome==="Yes"||t.outcome==="";
          if(isYes){return a+(m.yesWon?t.size*(t.price-1):t.size*t.price)}
          else{return a+(m.yesWon?t.size*t.price:t.size*(t.price-1))}
        },0);
        resolvedPnl+=buyPnl+sellPnl;
      }else{
        // Unrealised: round-trip estimate
        unrealCount++;
        const matched=Math.min(bQty,sQty);
        if(matched>0&&bQty>0&&sQty>0){const avgB=bCost/bQty,avgS=sRev/sQty;unrealPnl+=(avgS-avgB)*matched}
        const rem=bQty-sQty;if(rem>0&&bQty>0){const avgB=bCost/bQty;unrealPnl+=(m.lastPrice-avgB)*rem}
      }
    });
    const rPnl=Math.round(resolvedPnl*100)/100;const uPnl=Math.round(unrealPnl*100)/100;const totalPnl=Math.round((resolvedPnl+unrealPnl)*100)/100;
    return{...wl,cats:[...wl.cats],tc,vol:Math.round(sizes.reduce((a,b)=>a+b,0)*100)/100,avg:Math.round(avg*100)/100,cv:Math.round(cv*100)/100,sTs:sTs||sS,hrs,sc:Math.round(Math.min(sc,1)*100)/100,cls:sc>=.4?"bot":sc>=.2?"uncertain":"human",bp:ts>0?Math.round((wl.sides.BUY||0)/ts*100):0,rPnl,uPnl,pnl:totalPnl,rMkts:resolvedCount,uMkts:unrealCount}
  }).sort((a,b)=>b.sc-a.sc||b.tc-a.tc);
  // Compute time range - use only recent trades (not old resolved markets)
  const now=Math.floor(Date.now()/1000);
  const recentTs=polyT.map(t=>t.ts).filter(t=>t>0&&t>now-86400*30);// last 30 days only
  const allTs=polyT.map(t=>t.ts).filter(t=>t>0);
  timeRange.min=recentTs.length?Math.min(...recentTs):allTs.length?Math.min(...allTs):0;
  timeRange.max=recentTs.length?Math.max(...recentTs):allTs.length?Math.max(...allTs):0;
  timeRange.total=allTs.length;timeRange.resolved=(window._rTrades||[]).length;
}

function strategyOf(wl){const both=wl.bp>=30&&wl.bp<=70;const crypto=wl.cats.some(c=>c==="crypto15m"||c==="crypto");const dir=wl.bp>75||wl.bp<25;const multi=wl.cats.length>=2;if(both&&(wl.sTs||wl.cv<.3)&&crypto)return"arbitrage";if(both&&wl.sTs)return"arbitrage";if(dir&&(multi||wl.cv>.3))return"model";if(dir)return"model";return"news"}
function getBots(){const bots=W.filter(w=>w.cls==="bot");const g={arbitrage:[],model:[],news:[]};bots.forEach(b=>{b.strat=strategyOf(b);g[b.strat].push(b)});return g}

function timeRangeHTML(){if(!timeRange.min)return"";const spanMs=(timeRange.max-timeRange.min)*1000;const spanHrs=Math.round(spanMs/3600000*10)/10;const spanLabel=spanHrs<1?Math.round(spanMs/60000)+" minutes":spanHrs<24?spanHrs+" hours":Math.round(spanHrs/24*10)/10+" days";return`<div class="time-range">Data window: <b>${fmtTime(timeRange.min)}</b> to <b>${fmtTime(timeRange.max)}</b> (${spanLabel})</div>`}

async function fetchAll(){
  if(loading)return;loading=true;logL=[];polyT=[];W=[];pct=0;render();
  const pm={};
  log("STEP 1  Polymarket trades (paginated, limit=500)","ok");pct=5;render();
  for(let o=0;o<2000;o+=500){
    try{const r=await fetch(`/api/trades?offset=${o}`);const d=await r.json();if(!Array.isArray(d)||!d.length){log(`  offset=${o}: empty, stopping`,"warn");break}let n=0;d.forEach(t=>{const tx=t.transactionHash||"";if(tx&&!pm[tx]){pm[tx]={wallet:t.proxyWallet||"",name:t.name||t.pseudonym||"",side:t.side,size:parseFloat(t.size)||0,price:parseFloat(t.price)||0,ts:t.timestamp,title:t.title||"",slug:t.slug||"",outcome:t.outcome||"",cat:catS(t.slug,t.title),txHash:tx};n++}});
    log(`  offset=${o}: +${n} new (${Object.keys(pm).length} total)`,"ok");if(n===0)break}catch(e){log(`  Error: ${e}`,"err")}
    pct=5+Math.round(o/2000*30);render();await new Promise(r=>setTimeout(r,300));
  }
  log("\nSTEP 2  Per-market trades from top events","ok");pct=40;render();
  try{const evR=await fetch("/api/events");const evs=await evR.json();let cids=[];
    if(Array.isArray(evs)){evs.forEach(e=>{if(e.markets)e.markets.forEach(m=>{if(m.conditionId)cids.push({id:m.conditionId,q:m.question||e.title||""})})})}
    log(`  Found ${cids.length} markets from ${evs.length||0} events`,"ok");
    const tq=cids.slice(0,20);for(let i=0;i<tq.length;i++){
      try{const r=await fetch(`/api/trades?offset=0&market=${tq[i].id}`);const d=await r.json();if(Array.isArray(d)){let n=0;d.forEach(t=>{const tx=t.transactionHash||"";if(tx&&!pm[tx]){pm[tx]={wallet:t.proxyWallet||"",name:t.name||t.pseudonym||"",side:t.side,size:parseFloat(t.size)||0,price:parseFloat(t.price)||0,ts:t.timestamp,title:t.title||"",slug:t.slug||"",outcome:t.outcome||"",cat:catS(t.slug,t.title),txHash:tx};n++}});
        log(`  [${i+1}/${tq.length}] ${tq[i].q.slice(0,40)}... +${n}`,"ok")}}catch(e){}
      pct=40+Math.round(i/tq.length*50);render();await new Promise(r=>setTimeout(r,300));
    }
  }catch(e){log(`  Error: ${e}`,"err")}
  polyT=Object.values(pm);
  log(`\n  Active markets: ${polyT.length} trades, ${new Set(polyT.map(t=>t.wallet)).size} wallets`,"ok");
  pct=70;render();

  // STEP 3: Resolved markets — real P&L
  log("\nSTEP 3  Resolved markets (closed events + outcomes)","ok");
  const rm={};// marketSlug -> {outcome: "Yes"/"No", outcomePrices: [...]}
  const rTrades=[];// resolved trades
  try{
    const evR=await fetch("/api/events?closed=true");const evs=await evR.json();
    let resolvedMkts=[];
    if(Array.isArray(evs)){evs.forEach(e=>{if(e.markets)e.markets.forEach(m=>{
      if(m.conditionId&&m.outcomePrices){
        try{const prices=JSON.parse(m.outcomePrices);const resolved=prices.some(p=>parseFloat(p)>=0.99||parseFloat(p)<=0.01);
          if(resolved){const yesWon=parseFloat(prices[0])>=0.99;rm[m.conditionId]={slug:m.slug||"",question:m.question||e.title||"",yesWon,cat:catS(m.slug||"",m.question||e.title||"")};resolvedMkts.push({id:m.conditionId,q:m.question||e.title||""})}}catch(ex){}
      }
    })})}
    log(`  Found ${resolvedMkts.length} resolved markets from ${(await (await fetch("/api/events?closed=true")).json()).length||0} events`,"ok");
    const rq=resolvedMkts.slice(0,15);
    for(let i=0;i<rq.length;i++){
      try{const r=await fetch(`/api/trades?offset=0&market=${rq[i].id}`);const d=await r.json();
        if(Array.isArray(d)){let n=0;d.forEach(t=>{
          const tx=t.transactionHash||"";
          rTrades.push({wallet:t.proxyWallet||"",name:t.name||t.pseudonym||"",side:t.side,size:parseFloat(t.size)||0,price:parseFloat(t.price)||0,ts:t.timestamp,title:t.title||"",slug:t.slug||"",outcome:t.outcome||"",cat:catS(t.slug||"",t.title||""),txHash:tx,mktId:rq[i].id});
          // Also add to main pool for classification
          if(tx&&!pm[tx]){pm[tx]={wallet:t.proxyWallet||"",name:t.name||t.pseudonym||"",side:t.side,size:parseFloat(t.size)||0,price:parseFloat(t.price)||0,ts:t.timestamp,title:t.title||"",slug:t.slug||"",outcome:t.outcome||"",cat:catS(t.slug||"",t.title||""),txHash:tx}}
          n++});
          log(`  [${i+1}/${rq.length}] ${rq[i].q.slice(0,40)}... ${n} trades`,"ok");
        }}catch(e){}
      pct=70+Math.round(i/rq.length*25);render();await new Promise(r=>setTimeout(r,300));
    }
  }catch(e){log(`  Error: ${e}`,"err")}
  polyT=Object.values(pm);
  log(`\nDONE  ${polyT.length} total trades | ${rTrades.length} from resolved markets | ${Object.keys(rm).length} resolved outcomes`,"ok");
  // Store globally
  window._rm=rm;window._rTrades=rTrades;
  buildW();loading=false;pct=100;
  document.getElementById("badges").innerHTML=`<span class="pill pill-b">${polyT.length} trades</span><span class="pill pill-g">${W.length} wallets</span><span class="pill pill-r">${W.filter(w=>w.cls==="bot").length} bots</span><span class="pill pill-a">${W.filter(w=>w.cls==="human").length} human</span>${timeRange.min?`<span class="pill pill-b" style="color:var(--t2);border-color:var(--bor);background:var(--s2)">${fmtTime(timeRange.min)} to ${fmtTime(timeRange.max)}</span>`:""}`;
  render();
}

  const hTot={r:humans.reduce((a,w)=>a+w.rPnl,0),u:humans.reduce((a,w)=>a+w.uPnl,0),trades:humans.reduce((a,w)=>a+w.tc,0),vol:humans.reduce((a,w)=>a+w.vol,0)};
  bTot.total=bTot.r+bTot.u;hTot.total=hTot.r+hTot.u;
  bTot.ppt=bTot.trades>0?bTot.total/bTot.trades:0;hTot.ppt=hTot.trades>0?hTot.total/hTot.trades:0;
  // Per-category winners
  const cats={};W.forEach(w=>{w.cats.forEach(cat=>{if(!cats[cat])cats[cat]={bPnl:0,hPnl:0,bT:0,hT:0};if(w.cls==="bot"){cats[cat].bPnl+=w.rPnl+w.uPnl;cats[cat].bT+=w.tc}else if(w.cls==="human"){cats[cat].hPnl+=w.rPnl+w.uPnl;cats[cat].hT+=w.tc}})});
  const catArr=Object.entries(cats).filter(([,v])=>v.bT>=3&&v.hT>=3).sort((a,b)=>(b[1].bT+b[1].hT)-(a[1].bT+a[1].hT));

  const pn=(v)=>`<span style="color:${v>=0?"var(--grn)":"var(--red)"}">  ${v>=0?"+":""}${Math.round(v*100)/100}</span>`;
  return`<div class="sec-t">Bot vs Human: Overall Performance</div>

<div class="g g3" style="margin-bottom:6px"><div><div class="c-num" style="font-size:16px">${ht}</div><div class="c-sub">trades</div></div><div><div class="c-num" style="font-size:16px">${ha}</div><div class="c-sub">avg size</div></div><div><div class="c-num" style="font-size:16px">${hbp}%</div><div class="c-sub">buy%</div></div></div>
<div class="g g2" style="margin-bottom:0"><div style="padding:6px 8px;background:var(--s1);border-radius:6px"><div class="sm">Realised P&L</div><div class="mono" style="font-size:14px;font-weight:700;color:${hrP>=0?"var(--grn)":"var(--red)"}">${hrP>=0?"+":""}${hrP}</div></div><div style="padding:6px 8px;background:var(--s1);border-radius:6px"><div class="sm">Unrealised P&L</div><div class="mono" style="font-size:14px;color:${huP>=0?"var(--grn)":"var(--red)"}">${huP>=0?"+":""}${huP}</div></div></div></div>
</div>
<div class="sm" style="margin-top:10px;padding:8px 12px;background:var(--s1);border-radius:6px">
<b>Insight:</b> ${botBigger?`Bots trade ${ba>0&&ha>0?(ba/ha).toFixed(1)+"x":"significantly"} larger positions.`:"Humans trade larger positions."} ${botMoreActive?`Bots are ${bw>0&&hw>0?((bt/bw)/(ht/hw)).toFixed(1)+"x":"more"} more active per wallet.`:"Humans are more active per wallet."} ${(brP+buP)/(bt||1)>(hrP+huP)/(ht||1)&&bt>=3?`<b style="color:var(--red)">Bots are winning</b> (+${((brP+buP)/(bt||1)).toFixed(2)}/trade vs ${((hrP+huP)/(ht||1)).toFixed(2)}/trade).`:`<b style="color:var(--grn)">Humans are winning</b> (+${((hrP+huP)/(ht||1)).toFixed(2)}/trade vs ${((brP+buP)/(bt||1)).toFixed(2)}/trade).`}</div></div>`}).join("")}

<div class="vb"><h3>What the data shows</h3>
${sorted.slice(0,4).map(([cat,d])=>{
  const bpct=Math.round(d.bot.vol/(d.bot.vol+d.human.vol+.001)*100);
  const brP=Math.round(d.bot.rPnl*100)/100,buP=Math.round(d.bot.uPnl*100)/100;
  const hrP=Math.round(d.human.rPnl*100)/100,huP=Math.round(d.human.uPnl*100)/100;
  return`<p style="margin-top:8px">${tg(catLabel(cat),catTg(cat))} <span style="color:${bpct>15?"var(--red)":"var(--grn)"}">${bpct}% bot vol</span> | Bot: <span class="mono" style="color:${brP>=0?"var(--grn)":"var(--red)"}">${brP>=0?"+":""}${brP} realised</span>, <span class="mono" style="color:${buP>=0?"var(--grn)":"var(--red)"}">${buP>=0?"+":""}${buP} unreal.</span> | Human: <span class="mono" style="color:${hrP>=0?"var(--grn)":"var(--red)"}">${hrP>=0?"+":""}${hrP} realised</span>, <span class="mono" style="color:${huP>=0?"var(--grn)":"var(--red)"}">${huP>=0?"+":""}${huP} unreal.</span></p>`}).join("")}
<p style="color:var(--amb);margin-top:16px"><b>Governance implication:</b> Bot concentration varies 5-10x across categories. One-size-fits-all regulation would over-regulate political markets and under-regulate crypto 15-min.</p></div>`}

const R={"Dashboard":rDash,"P&L Comparison":rPnL,"Bot Strategies":rStrat,"Win Rates":rWR,"Market Impact":rImpact,"By Contract Type":rByType};
function render(){document.getElementById("nav").innerHTML=TABS.map(t=>`<button class="${t===tab?"on":""}" onclick="go('${t}')">${t}</button>`).join("");document.getElementById("ct").innerHTML=R[tab]();const el=document.getElementById("fl");if(el)el.scrollTop=el.scrollHeight}
function go(t){tab=t;render();window.scrollTo(0,0)}
function setFilter(f){filter=f;render()}
function toggleDrill(id){document.getElementById(id)?.classList.toggle("open")}
render();
</script>
</body></html>
